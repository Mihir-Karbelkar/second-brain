name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        env:
          CI: 1
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          ref_name="${GITHUB_REF_NAME:-manual}"
          safe_ref_name="$(printf '%s' "$ref_name" | sed 's#[^A-Za-z0-9._-]#-#g')"
          apk_path="$(find android/app/build/outputs/apk/release -name '*.apk' -type f | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK was produced." >&2
            exit 1
          fi
          cp "$apk_path" "artifacts/second-brain-${safe_ref_name}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: second-brain-android-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
